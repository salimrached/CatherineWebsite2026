<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get Fit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="base.css" />
    <link rel="stylesheet" href="getfit.css" />
  </head>
  <body>
    <section class="getfit-section">
      <div class="getfit-title">
        <h1>🏋️ Get Fit</h1>
      </div>
      <div class="getfit-grid">
        <div
          class="getfit-card"
          data-video="assets/getfit/01_GetFit_January21_2023.mp4"
        >
          <div class="getfit-card_thumbnail">
            <img
              src="assets/getfit/01_January21.jpg"
              alt="Get Fit January 21"
            />
            <div class="getfit-card_play">&#9654;</div>
          </div>
          <div class="getfit-card_info">
            <h3>Get Fit</h3>
            <p>January 21, 2023</p>
          </div>
        </div>

        <div
          class="getfit-card"
          data-video="assets/getfit/02_GetFit_18Mars_2023.mp4"
        >
          <div class="getfit-card_thumbnail">
            <img src="assets/getfit/02_March18.jpg" alt="Get Fit March 18" />
            <div class="getfit-card_play">&#9654;</div>
          </div>
          <div class="getfit-card_info">
            <h3>Get Fit</h3>
            <p>March 18, 2023</p>
          </div>
        </div>

        <div
          class="getfit-card"
          data-video="assets/getfit/03_GetFit_April1_2023.mp4"
        >
          <div class="getfit-card_thumbnail">
            <img src="assets/getfit/03_April1.jpg" alt="Get Fit April 1" />
            <div class="getfit-card_play">&#9654;</div>
          </div>
          <div class="getfit-card_info">
            <h3>Get Fit</h3>
            <p>April 1, 2023</p>
          </div>
        </div>

        <div
          class="getfit-card"
          data-video="assets/getfit/04_GetFit_April8_2023.mp4"
        >
          <div class="getfit-card_thumbnail">
            <img src="assets/getfit/04_April8.jpg" alt="Get Fit April 8" />
            <div class="getfit-card_play">&#9654;</div>
          </div>
          <div class="getfit-card_info">
            <h3>Get Fit</h3>
            <p>April 8, 2023</p>
          </div>
        </div>

        <div
          class="getfit-card"
          data-video="assets/getfit/05_GetFit_April22_2023.mp4"
        >
          <div class="getfit-card_thumbnail">
            <img src="assets/getfit/05_April22.jpg" alt="Get Fit April 22" />
            <div class="getfit-card_play">&#9654;</div>
          </div>
          <div class="getfit-card_info">
            <h3>Get Fit</h3>
            <p>April 22, 2023</p>
          </div>
        </div>

        <div
          class="getfit-card"
          data-video="assets/getfit/06_GetFit_April29_2023.mp4"
        >
          <div class="getfit-card_thumbnail">
            <img src="assets/getfit/06_April29.jpg" alt="Get Fit April 29" />
            <div class="getfit-card_play">&#9654;</div>
          </div>
          <div class="getfit-card_info">
            <h3>Get Fit</h3>
            <p>April 29, 2023</p>
          </div>
        </div>

        <div
          class="getfit-card"
          data-video="assets/getfit/07_GetFit_May6_2023.mp4"
        >
          <div class="getfit-card_thumbnail">
            <img src="assets/getfit/07_May6.jpg" alt="Get Fit May 6" />
            <div class="getfit-card_play">&#9654;</div>
          </div>
          <div class="getfit-card_info">
            <h3>Get Fit</h3>
            <p>May 6, 2023</p>
          </div>
        </div>

        <div
          class="getfit-card"
          data-video="assets/getfit/08_GetFit_May27_2023.mp4"
        >
          <div class="getfit-card_thumbnail">
            <img src="assets/getfit/08_May27.jpg" alt="Get Fit May 27" />
            <div class="getfit-card_play">&#9654;</div>
          </div>
          <div class="getfit-card_info">
            <h3>Get Fit</h3>
            <p>May 27, 2023</p>
          </div>
        </div>
      </div>
    </section>

    <!-- Video Overlay -->
    <div class="video-overlay" id="video-overlay">
      <button class="video-overlay_close" id="video-overlay-close">
        &times;
      </button>
      <button class="video-overlay_prev" id="video-overlay-prev">
        &#8592;
      </button>
      <video
        class="video-overlay_player"
        id="video-overlay-player"
        controls
      ></video>
      <button class="video-overlay_next" id="video-overlay-next">
        &#8594;
      </button>
    </div>

    <script src="getfit.js"></script>
  </body>
</html>
